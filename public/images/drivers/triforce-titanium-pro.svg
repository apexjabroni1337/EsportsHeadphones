<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#44d62c" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#44d62c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titanium" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c0c0c0"/>
      <stop offset="50%" stop-color="#808080"/>
      <stop offset="100%" stop-color="#a0a0a0"/>
    </linearGradient>
    <linearGradient id="ring-pro" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#44d62c"/>
      <stop offset="50%" stop-color="#66ff44"/>
      <stop offset="100%" stop-color="#44d62c"/>
    </linearGradient>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="200" cy="200" r="190" fill="url(#glow)"/>
  <!-- Premium outer housing -->
  <circle cx="200" cy="200" r="165" fill="#1a1a1a" stroke="#44d62c" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="200" cy="200" r="160" fill="#222" stroke="url(#ring-pro)" stroke-width="2.5" filter="url(#glow-filter)"/>
  <!-- Titanium coated diaphragm sections -->
  <path d="M200 65 L200 200 L330 130 A140 140 0 0 0 200 65Z" fill="#2d2d2d" stroke="#44d62c" stroke-width="1.5" stroke-opacity="0.5"/>
  <path d="M330 130 L200 200 L330 270 A140 140 0 0 0 330 130Z" fill="#282828" stroke="#44d62c" stroke-width="1.5" stroke-opacity="0.5"/>
  <path d="M330 270 L200 200 L200 340 A140 140 0 0 0 330 270Z" fill="#2d2d2d" stroke="#44d62c" stroke-width="1.5" stroke-opacity="0.5"/>
  <path d="M200 340 L200 200 L70 270 A140 140 0 0 0 200 340Z" fill="#282828" stroke="#44d62c" stroke-width="1.5" stroke-opacity="0.5"/>
  <path d="M70 270 L200 200 L70 130 A140 140 0 0 0 70 270Z" fill="#2d2d2d" stroke="#44d62c" stroke-width="1.5" stroke-opacity="0.5"/>
  <path d="M70 130 L200 200 L200 65 A140 140 0 0 0 70 130Z" fill="#282828" stroke="#44d62c" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- Titanium center dome -->
  <circle cx="200" cy="200" r="50" fill="url(#titanium)" opacity="0.3"/>
  <circle cx="200" cy="200" r="50" fill="#1a1a1a" stroke="#44d62c" stroke-width="2.5"/>
  <circle cx="200" cy="200" r="35" fill="#111" stroke="#44d62c" stroke-width="1" stroke-opacity="0.6"/>
  <circle cx="200" cy="200" r="15" fill="#44d62c" opacity="0.15"/>
  <!-- PRO badge -->
  <rect x="160" y="183" width="80" height="18" rx="4" fill="#44d62c" opacity="0.15"/>
  <text x="200" y="196" font-family="'Space Grotesk', system-ui" font-size="11" fill="#44d62c" text-anchor="middle" font-weight="bold">PRO</text>
  <!-- Labels -->
  <text x="280" y="110" font-family="'Space Grotesk', system-ui" font-size="10" fill="#44d62c" opacity="0.7">HIGHS</text>
  <text x="310" y="210" font-family="'Space Grotesk', system-ui" font-size="10" fill="#44d62c" opacity="0.7">MIDS</text>
  <text x="80" y="210" font-family="'Space Grotesk', system-ui" font-size="10" fill="#44d62c" opacity="0.7">LOWS</text>
  <text x="200" y="375" font-family="'Space Grotesk', system-ui" font-size="13" fill="#666" text-anchor="middle" font-weight="bold">50mm TriForce Titanium Pro</text>
</svg>