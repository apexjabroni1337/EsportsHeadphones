async function startDownload() {
  const btn = document.getElementById('startBtn');
  const status = document.getElementById('status');
  const progressBar = document.getElementById('progressBar');
  btn.disabled = true;
  status.innerHTML = '';

  const zip = new JSZip();
  const entries = Object.entries(images);
  let success = 0, failed = 0;

  function log(msg, cls) {
    status.innerHTML += `<span class="${cls}">${msg}</span>\n`;
    status.scrollTop = status.scrollHeight;
  }

  log(`Starting download of ${entries.length} images...`, 'info');

  for (let i = 0; i < entries.length; i++) {
    const [name, url] = entries[i];
    const pct = Math.round(((i + 1) / entries.length) * 100);
    progressBar.style.width = pct + '%';

    try {
      const resp = await fetch(url);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const blob = await resp.blob();
      zip.file(`${name}.jpg`, blob);
      log(`✓ ${name}.jpg (${Math.round(blob.size/1024)}KB)`, 'ok');
      success++;
    } catch(e) {
      log(`✗ ${name}.jpg - ${e.message}`, 'fail');
      failed++;
    }

    // Small delay to avoid hammering
    await new Promise(r => setTimeout(r, 100));
  }

  log(`\nDownloaded: ${success} OK, ${failed} failed`, 'info');
  log('Generating ZIP file...', 'info');

  try {
    const zipBlob = await zip.generateAsync({type: 'blob'}, (meta) => {
      progressBar.style.width = Math.round(meta.percent) + '%';
    });

    const a = document.createElement('a');
    a.href = URL.createObjectURL(zipBlob);
    a.download = 'headphone-images.zip';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    log(`\n✓ ZIP file ready! (${Math.round(zipBlob.size/1024/1024*10)/10}MB) - downloading now...`, 'info');
    log('\nAfter downloading, extract the ZIP contents into:', 'info');
    log('EsportsHeadphones\\public\\images\\headphones\\', 'info');
  } catch(e) {
    log(`\n✗ ZIP generation failed: ${e.message}`, 'fail');
  }

  btn.disabled = false;
  btn.textContent = 'Download Again';
}
