<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00b4ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00b4ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mesh" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <pattern id="mesh-pattern" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="1" fill="#00b4ff" opacity="0.15"/>
      <line x1="0" y1="6" x2="12" y2="6" stroke="#00b4ff" stroke-width="0.3" opacity="0.1"/>
      <line x1="6" y1="0" x2="6" y2="12" stroke="#00b4ff" stroke-width="0.3" opacity="0.1"/>
    </pattern>
    <filter id="blue-glow">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#00b4ff" flood-opacity="0.3"/>
    </filter>
  </defs>
  <circle cx="200" cy="200" r="190" fill="url(#glow)"/>
  <!-- Outer housing -->
  <circle cx="200" cy="200" r="160" fill="#1e1e1e" stroke="#00b4ff" stroke-width="2" stroke-opacity="0.4"/>
  <!-- Hybrid mesh diaphragm -->
  <circle cx="200" cy="200" r="140" fill="url(#mesh)"/>
  <circle cx="200" cy="200" r="140" fill="url(#mesh-pattern)"/>
  <!-- Concentric rings (woven material pattern) -->
  <circle cx="200" cy="200" r="130" fill="none" stroke="#00b4ff" stroke-width="0.5" opacity="0.2"/>
  <circle cx="200" cy="200" r="110" fill="none" stroke="#00b4ff" stroke-width="0.5" opacity="0.25"/>
  <circle cx="200" cy="200" r="90" fill="none" stroke="#00b4ff" stroke-width="0.5" opacity="0.3"/>
  <circle cx="200" cy="200" r="70" fill="none" stroke="#00b4ff" stroke-width="0.5" opacity="0.35"/>
  <!-- Suspension surround -->
  <circle cx="200" cy="200" r="145" fill="none" stroke="#333" stroke-width="6"/>
  <circle cx="200" cy="200" r="145" fill="none" stroke="#00b4ff" stroke-width="1" stroke-opacity="0.2"/>
  <!-- Center dome -->
  <circle cx="200" cy="200" r="40" fill="#1a1a1a" stroke="#00b4ff" stroke-width="2" filter="url(#blue-glow)"/>
  <circle cx="200" cy="200" r="25" fill="#111" stroke="#00b4ff" stroke-width="1" stroke-opacity="0.5"/>
  <!-- PRO-G branding -->
  <text x="200" y="204" font-family="'Space Grotesk', system-ui" font-size="10" fill="#00b4ff" text-anchor="middle" font-weight="bold" opacity="0.8">G</text>
  <!-- Frequency wave visualization -->
  <path d="M60 320 Q100 305 140 315 Q180 325 200 310 Q220 295 260 310 Q300 325 340 315" fill="none" stroke="#00b4ff" stroke-width="1.5" opacity="0.3"/>
  <path d="M60 335 Q100 325 140 330 Q180 335 200 325 Q220 315 260 325 Q300 335 340 330" fill="none" stroke="#00b4ff" stroke-width="1" opacity="0.2"/>
  <text x="200" y="375" font-family="'Space Grotesk', system-ui" font-size="13" fill="#666" text-anchor="middle" font-weight="bold">50mm PRO-G</text>
</svg>