<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8844cc" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#8844cc" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="senn-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9966dd"/>
      <stop offset="100%" stop-color="#6633aa"/>
    </linearGradient>
    <filter id="purple-glow">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#8844cc" flood-opacity="0.25"/>
    </filter>
    <pattern id="precision-grid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <line x1="10" y1="0" x2="10" y2="20" stroke="#8844cc" stroke-width="0.3" opacity="0.1"/>
      <line x1="0" y1="10" x2="20" y2="10" stroke="#8844cc" stroke-width="0.3" opacity="0.1"/>
    </pattern>
  </defs>
  <circle cx="200" cy="200" r="190" fill="url(#glow)"/>
  <!-- Precision-engineered housing -->
  <circle cx="200" cy="200" r="160" fill="#1e1e1e" stroke="url(#senn-grad)" stroke-width="2" filter="url(#purple-glow)"/>
  <!-- Transducer diaphragm -->
  <circle cx="200" cy="200" r="140" fill="#222"/>
  <circle cx="200" cy="200" r="140" fill="url(#precision-grid)"/>
  <!-- Precision manufacturing lines -->
  <circle cx="200" cy="200" r="135" fill="none" stroke="#8844cc" stroke-width="0.4" opacity="0.15"/>
  <circle cx="200" cy="200" r="120" fill="none" stroke="#8844cc" stroke-width="0.4" opacity="0.18"/>
  <circle cx="200" cy="200" r="105" fill="none" stroke="#8844cc" stroke-width="0.4" opacity="0.2"/>
  <circle cx="200" cy="200" r="90" fill="none" stroke="#8844cc" stroke-width="0.4" opacity="0.22"/>
  <circle cx="200" cy="200" r="75" fill="none" stroke="#8844cc" stroke-width="0.4" opacity="0.25"/>
  <!-- Surround -->
  <circle cx="200" cy="200" r="145" fill="none" stroke="#444" stroke-width="6"/>
  <!-- Frequency response visualization across diaphragm -->
  <path d="M80 200 Q120 170 140 195 Q160 220 180 185 Q195 160 200 200 Q205 240 220 215 Q240 180 260 205 Q280 230 320 200" fill="none" stroke="#8844cc" stroke-width="1.5" opacity="0.25"/>
  <!-- Center transducer element -->
  <circle cx="200" cy="200" r="42" fill="#1a1a1a" stroke="#8844cc" stroke-width="2" filter="url(#purple-glow)"/>
  <circle cx="200" cy="200" r="30" fill="#151515" stroke="#8844cc" stroke-width="1" stroke-opacity="0.5"/>
  <!-- Sennheiser-style precision crosshairs -->
  <line x1="200" y1="175" x2="200" y2="185" stroke="#8844cc" stroke-width="1" opacity="0.5"/>
  <line x1="200" y1="215" x2="200" y2="225" stroke="#8844cc" stroke-width="1" opacity="0.5"/>
  <line x1="175" y1="200" x2="185" y2="200" stroke="#8844cc" stroke-width="1" opacity="0.5"/>
  <line x1="215" y1="200" x2="225" y2="200" stroke="#8844cc" stroke-width="1" opacity="0.5"/>
  <circle cx="200" cy="200" r="12" fill="none" stroke="#8844cc" stroke-width="0.8" opacity="0.4"/>
  <!-- German engineering badge -->
  <rect x="160" y="240" width="80" height="14" rx="3" fill="#8844cc" opacity="0.1"/>
  <text x="200" y="250" font-family="'Space Grotesk', system-ui" font-size="8" fill="#8844cc" text-anchor="middle" letter-spacing="2" opacity="0.6">PRECISION</text>
  <text x="200" y="375" font-family="'Space Grotesk', system-ui" font-size="13" fill="#666" text-anchor="middle" font-weight="bold">Custom Transducers</text>
</svg>