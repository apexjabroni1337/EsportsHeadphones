<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#44d62c" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#44d62c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="driver-face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="ring-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#44d62c"/>
      <stop offset="100%" stop-color="#2aa01e"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#44d62c" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background glow -->
  <circle cx="200" cy="200" r="190" fill="url(#glow)"/>
  <!-- Outer housing -->
  <circle cx="200" cy="200" r="160" fill="#222" stroke="#333" stroke-width="2"/>
  <!-- Driver cone outer ring -->
  <circle cx="200" cy="200" r="140" fill="none" stroke="url(#ring-grad)" stroke-width="3" filter="url(#shadow)"/>
  <!-- Diaphragm sections (TriForce 3-part design) -->
  <!-- Low frequency zone -->
  <path d="M200 60 L200 200 L340 200 A140 140 0 0 0 200 60Z" fill="#2a2a2a" stroke="#44d62c" stroke-width="1" stroke-opacity="0.4"/>
  <!-- Mid frequency zone -->
  <path d="M200 200 L340 200 A140 140 0 0 1 200 340 L200 200Z" fill="#252525" stroke="#44d62c" stroke-width="1" stroke-opacity="0.4"/>
  <!-- High frequency zone -->
  <path d="M200 200 L200 340 A140 140 0 0 1 60 200 L200 200Z" fill="#2a2a2a" stroke="#44d62c" stroke-width="1" stroke-opacity="0.4"/>
  <!-- Remaining section -->
  <path d="M200 200 L60 200 A140 140 0 0 1 200 60 L200 200Z" fill="#252525" stroke="#44d62c" stroke-width="1" stroke-opacity="0.4"/>
  <!-- Center dome -->
  <circle cx="200" cy="200" r="45" fill="url(#driver-face)" stroke="#44d62c" stroke-width="2"/>
  <circle cx="200" cy="200" r="30" fill="#1a1a1a" stroke="#44d62c" stroke-width="1" stroke-opacity="0.5"/>
  <!-- Titanium coating shimmer -->
  <circle cx="200" cy="200" r="140" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.1"/>
  <!-- Labels -->
  <text x="270" y="150" font-family="'Space Grotesk', system-ui" font-size="11" fill="#44d62c" opacity="0.8">HIGHS</text>
  <text x="260" y="280" font-family="'Space Grotesk', system-ui" font-size="11" fill="#44d62c" opacity="0.8">MIDS</text>
  <text x="100" y="280" font-family="'Space Grotesk', system-ui" font-size="11" fill="#44d62c" opacity="0.8">LOWS</text>
  <!-- Size label -->
  <text x="200" y="375" font-family="'Space Grotesk', system-ui" font-size="13" fill="#666" text-anchor="middle" font-weight="bold">50mm TriForce Titanium</text>
</svg>